name: HabitFlow
options:
  bundleIdPrefix: com.ethankim
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  generateEmptyDirectories: true

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  google-sign-in:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "8.0.0"

targets:
  HabitFlow:
    type: application
    platform: iOS
    sources:
      - path: HabitFlow/Sources
      - path: HabitFlow/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethankim.HabitFlow
        DEVELOPMENT_TEAM: Y3RX7DCMNV
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: HabitFlow
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: google-sign-in
        product: GoogleSignIn
      - target: HabitFlowWidgetExtension
        embed: true
    entitlements:
      path: HabitFlow/HabitFlow.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ethankim.HabitFlow

  HabitFlow-macOS:
    type: application
    platform: macOS
    sources:
      - path: HabitFlow/Sources
      - path: HabitFlow/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethankim.HabitFlow
        DEVELOPMENT_TEAM: Y3RX7DCMNV
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: HabitFlow
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: google-sign-in
        product: GoogleSignIn
    entitlements:
      path: HabitFlow/HabitFlow-macOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ethankim.HabitFlow
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  HabitFlowWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: HabitFlowWidget
      - path: HabitFlow/Sources/Widget
      - path: HabitFlow/Sources/Utilities/Color+Hex.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethankim.HabitFlow.Widget
        DEVELOPMENT_TEAM: Y3RX7DCMNV
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: HabitFlowWidget/Info.plist
      properties:
        CFBundleDisplayName: HabitFlow Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HabitFlowWidget/HabitFlowWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ethankim.HabitFlow

  HabitFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HabitFlowTests
    dependencies:
      - target: HabitFlow
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
