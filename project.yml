name: HabitFlow
options:
  bundleIdPrefix: com.ethankim
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"

targets:
  HabitFlow:
    type: application
    platform: iOS
    sources:
      - path: HabitFlow/Sources
      - path: HabitFlow/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethankim.HabitFlow
        INFOPLIST_KEY_CFBundleDisplayName: HabitFlow
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore

  HabitFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HabitFlowTests
    dependencies:
      - target: HabitFlow
    settings:
      base:
        SWIFT_VERSION: "6.0"
